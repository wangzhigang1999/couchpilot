<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">CouchPilot Windows tray icon</title>
  <!--
    The notification-area mark deliberately has no background rectangle.
    Its warm fill stays visible on dark taskbars, while the dark keyline keeps
    the silhouette crisp on light taskbars and at the native 16 px size.
  -->
  <path
    d="M18 19h28c6 0 10 4 12 10l3 13c2 7-6 12-12 7l-8-7H23l-8 7C9 54 1 49 3 42l3-13c2-6 6-10 12-10Z"
    fill="#f0643d"
    stroke="#211e1b"
    stroke-width="1.75"
    stroke-linejoin="round"
  />
  <path d="M20 29v12M14 35h12" fill="none" stroke="#211e1b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="43" cy="31" r="3" fill="#fff7e8" stroke="#211e1b" stroke-width="1.25"/>
  <circle cx="51" cy="38" r="3" fill="#211e1b"/>
</svg>

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...

  build-windows:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - shell: pwsh
        run: go build -trimpath -ldflags "-s -w" -o bin/couchpilot.exe ./cmd/couchpilot
      - uses: actions/upload-artifact@v4
        with:
          name: couchpilot-windows-amd64
          path: bin/couchpilot.exe
          if-no-files-found: error

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    name: Test and build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - shell: pwsh
        run: go build -trimpath -ldflags "-s -w" -o bin/couchpilot.exe ./cmd/couchpilot
      - uses: actions/upload-artifact@v7
        with:
          name: couchpilot-windows-amd64
          path: bin/couchpilot.exe
          if-no-files-found: error
